# ============================================================
# CD Pipeline - TaskFlow
# Archivo: .github/workflows/deploy.yml
#
# Propósito: Entrega Continua — despliega automáticamente
# la aplicación en GitHub Pages al hacer merge a main.
#
# Autor: Abel Maldonado Vasquez
# PA2 - Construcción de Software
# ============================================================

name: CD - Deploy to GitHub Pages

# ── Solo se activa en push a main (merge de PR) ───────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:   # Permite ejecución manual desde GitHub UI

# ── Permisos para GitHub Pages ────────────────────────────────
permissions:
  contents: read
  pages:    write
  id-token: write

# ── Evitar despliegues paralelos ──────────────────────────────
concurrency:
  group: pages
  cancel-in-progress: false

# ── Jobs ─────────────────────────────────────────────────────
jobs:
  # ── Job 1: Verificar y preparar ──────────────────────────
  build:
    name: 🏗️ Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🧪 Ejecutar tests antes del despliegue
        run: npm test

      - name: 🔍 Lint antes del despliegue
        run: npm run lint

      - name: 🏗️ Preparar archivos para despliegue
        run: |
          echo "📁 Preparando directorio de despliegue..."
          mkdir -p dist
          cp -r src/* dist/
          echo "✅ Archivos listos en /dist"
          ls -la dist/

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── Job 2: Desplegar en GitHub Pages ─────────────────────
  deploy:
    name: 🚀 Deploy a GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Despliegue exitoso
        run: |
          echo "🚀 TaskFlow desplegado exitosamente!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Fecha: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔖 Commit: ${{ github.sha }}"
